<html lang="en">
<head>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:black;
      display:flex;
      justify-content:center;

  font-weight:bold;
  transition:0.3s;

}

}

</head>
