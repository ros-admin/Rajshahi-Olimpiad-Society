<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-family:'Segoe UI',sans-serif;
}

/* 404 Image */
img{
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:#000;
}

/* Dark Overlay */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.15);
    pointer-events:none;
}

.home-btn{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);

    padding:14px 30px;

    color:#fff;
    font-weight:700;
    font-size:16px;
    text-decoration:none;

    border-radius:50px;

    background:rgb(1, 179, 214);

    border:2px solid transparent;

    background-image:
        linear-gradient(rgb(1,179,214), rgb(1,179,214)),
        linear-gradient(90deg, #00b4d8, #ffd700, #00b4d8);

    background-origin:border-box;
    background-clip:padding-box, border-box;

    background-size:100% 100%, 300% 100%;

    animation:borderMove 3s linear infinite;

    box-shadow:
        0 0 15px rgba(1,179,214,.45);

    transition:.3s;
}

.home-btn:hover{
    transform:translateX(-50%) translateY(-2px);

    box-shadow:
        0 0 20px rgba(1,179,214,.7),
        0 0 35px rgba(255,215,0,.4);
}

@keyframes borderMove{
    0%{
        background-position:0 0, 0% 50%;
    }
    100%{
        background-position:0 0, 300% 50%;
    }
}
</style>
</head>

<body>

<img src="../404.png" alt="404 Error">

<a class="home-btn"
   href="../Home/">
   Return Home
</a>

</body>
</html>
