<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-family:'Segoe UI',sans-serif;
}


    /* ব্যাকগ্রাউন্ডের ভাসমান কণা (Glowing Particles) */
    .particle {
      position: absolute;
      bottom: -20px;
      background: rgba(0, 180, 216, 0.25);
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp 4s linear infinite;
      box-shadow: 0 0 10px rgba(0, 180, 216, 0.5);
    }

    /* কণাগুলোর বিভিন্ন সাইজ ও টাইমিং */
    .particle:nth-child(1) { left: 15%; width: 6px; height: 6px; animation-duration: 3.5s; animation-delay: 0.2s; }
    .particle:nth-child(2) { left: 35%; width: 10px; height: 10px; animation-duration: 4.5s; animation-delay: 0.7s; background: rgba(255, 215, 0, 0.2); box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
    .particle:nth-child(3) { left: 55%; width: 5px; height: 5px; animation-duration: 3s; animation-delay: 0s; }
    .particle:nth-child(4) { left: 75%; width: 12px; height: 12px; animation-duration: 5s; animation-delay: 1.2s; }
    .particle:nth-child(5) { left: 90%; width: 8px; height: 8px; animation-duration: 4s; animation-delay: 0.5s; background: rgba(255, 215, 0, 0.2); }

    /* 404 Image */
img{
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:#000;
}

/* Dark Overlay */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.15);
    pointer-events:none;
}

.home-btn{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);

    padding:14px 30px;

    color:#fff;
    font-weight:700;
    font-size:16px;
    text-decoration:none;

    border-radius:50px;

    background:rgb(1, 179, 214);

    border:2px solid transparent;

    background-image:
        linear-gradient(rgb(1,179,214), rgb(1,179,214)),
        linear-gradient(90deg, #00b4d8, #ffd700, #00b4d8);

    background-origin:border-box;
    background-clip:padding-box, border-box;

    background-size:100% 100%, 300% 100%;

    animation:borderMove 3s linear infinite;

    box-shadow:
        0 0 15px rgba(1,179,214,.45);

    transition:.3s;
}

.home-btn:hover{
    transform:translateX(-50%) translateY(-2px);

    box-shadow:
        0 0 20px rgba(1,179,214,.7),
        0 0 35px rgba(255,215,0,.4);
}
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      30% { opacity: 0.8; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
    }

@keyframes borderMove{
    0%{
        background-position:0 0, 0% 50%;
    }
    100%{
        background-position:0 0, 300% 50%;
    }
}
</style>
</head>

<body>
<div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
<img src="../Assets/Logo/404.png" alt="404 Error">

<a class="home-btn"
   href="../Home/">
   Return Home
</a>

</body>
</html>
