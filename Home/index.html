<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>রাজশাহী অলিম্পিয়াড সোসাইটি</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { background-color: #01060d; color: #fff; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
    .sticky-header { position: sticky; top: 0; z-index: 1000; background: rgba(1, 6, 13, 0.95); backdrop-filter: blur(10px); }
  </style>
</head>
<body>

  <header class="sticky-header border-b border-gray-800 px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-[#00b4d8]">ROS</a>
      <nav class="hidden md:flex gap-8 text-sm font-semibold">
        <a href="index.html" class="hover:text-[#00b4d8]">হোম</a>
        <a href="About Us/about.html" class="hover:text-[#00b4d8]">আমাদের সম্পর্কে</a>
        <a href="Notice/index.html" class="hover:text-[#00b4d8]">বিজ্ঞপ্তি</a>
      </nav>
      <button id="menuBtn" class="md:hidden text-xl"><i class="fa-solid fa-bars"></i></button>
    </div>
  </header>

  <div id="mobileMenu" class="hidden md:hidden bg-[#0a0f1a] p-4 border-b border-gray-800">
    <a href="index.html" class="block py-2">হোম</a>
    <a href="About Us/about.html" class="block py-2">আমাদের সম্পর্কে</a>
    <a href="Notice/index.html" class="block py-2">বিজ্ঞপ্তি</a>
  </div>

  <main>
    <section class="relative h-[70vh] flex items-center justify-center text-center border-b-4 border-[#00b4d8]">
      <video class="absolute inset-0 w-full h-full object-cover" autoplay loop muted playsinline>
        <source src="bg video.mp4" type="video/mp4">
      </video>
      <div class="absolute inset-0 bg-black/60"></div>
      <h1 class="relative z-10 text-4xl md:text-6xl font-bold text-[#00b4d8]">রাজশাহী অলিম্পিয়াড সোসাইটি</h1>
    </section>

    <section class="py-16 px-6 text-center max-w-3xl mx-auto">
      <p class="text-gray-300 leading-relaxed mb-6">রাজশাহী অলিম্পিয়াড সোসাইটি হলো রাজশাহী অঞ্চলের শিক্ষার্থীদের মেধা ও সৃজনশীলতা বিকাশের একটি প্ল্যাটফর্ম।</p>
      <a href="About Us/about.html" class="px-8 py-3 bg-[#00b4d8] rounded-full text-white font-bold hover:bg-[#0096b4] transition-all">আরও জানুন</a>
    </section>

    <section id="eventSection" class="py-16 bg-[#0a0f1a] border-y border-gray-800 hidden">
      <div class="max-w-md mx-auto p-6 bg-[#111] rounded-xl text-center shadow-lg">
        <h2 class="text-xl font-bold mb-4 text-[#ffd700]" id="eventTitle"></h2>
        <button id="openModalBtn" class="px-6 py-2 bg-[#00b4d8] rounded-lg text-white font-semibold">বিস্তারিত দেখুন</button>
      </div>
    </section>
  </main>

  <div id="eventModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-[2000]">
    <div class="bg-[#111] p-8 rounded-xl max-w-lg w-full relative border border-gray-700">
      <button id="closeModal" class="absolute top-4 right-4 text-xl hover:text-red-500">×</button>
      <h3 id="modalTitle" class="text-2xl font-bold mb-4 text-[#00b4d8]"></h3>
      <p id="modalFullText" class="text-gray-400 mb-6 leading-relaxed"></p>
      <a id="volunteerLink" href="#" class="block w-full py-3 bg-emerald-600 text-center rounded font-bold hover:bg-emerald-700">ভলিন্টিয়ার হতে চাই</a>
    </div>
  </div>

  <footer class="bg-[#050b16] border-t border-gray-800 py-8 text-center text-gray-500 text-sm">
    <p>&copy; ২০২৬ রাজশাহী অলিম্পিয়াড সোসাইটি। সর্বস্বত্ব সংরক্ষিত।</p>
  </footer>

  <script>
    // মোবাইল মেনু টগল
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    });

    // ইভেন্ট ডেটা ফেচ ও মডাল লজিক
    async function loadEvent() {
      try {
        const res = await fetch('Next Event/event.json');
        const data = await res.json();
        if(data.status === "active") {
          document.getElementById('eventSection').classList.remove('hidden');
          document.getElementById('eventTitle').innerText = data.title;
          
          document.getElementById('openModalBtn').onclick = () => {
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalFullText').innerText = data.description;
            document.getElementById('volunteerLink').href = data.volunteer_url;
            document.getElementById('eventModal').classList.remove('hidden');
          };
        }
      } catch(e) { console.log("Event not found or inactive."); }
    }

    document.getElementById('closeModal').onclick = () => document.getElementById('eventModal').classList.add('hidden');
    loadEvent();
  </script>
</body>
</html>
