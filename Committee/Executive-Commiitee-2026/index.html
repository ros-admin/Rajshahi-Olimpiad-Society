<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>কার্যনির্বাহী কমিটি - রাজশাহী অলিম্পিয়াড সোসাইটি</title>
  <!-- ফন্ট এবং আইকন সিডিএন লিংক -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ১. অফিশিয়াল কালার প্যালেট (Global CSS Variables) */
    :root {
      --dark-bg: #020c1b;
      --panel-bg: #040d1a;
      --card-bg: rgba(10, 25, 47, 0.65);
      --secondary: #00b4d8;
      --accent: #ffd700;
      --text-light: #f1f5f9;
      --text-muted: #94a3b8;
    }

    /* রিসেট এবং বেস স্টাইল */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--dark-bg);
      font-family: 'Hind Siliguri', 'Poppins', sans-serif;
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* কাস্টম স্ক্রোলবার */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--dark-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 180, 216, 0.3);
      border-radius: 10px;
    }

    /* মূল কন্টেন্ট লেআউট */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ৩. গ্লাস-মরফিজম (Glassmorphism) কার্ড ও সাধারণ সুন্দর ডিজাইন */
    .coming-soon-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 180, 216, 0.2);
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    /* গ্লাস শাইন ও হোভার ইফেক্ট */
    .coming-soon-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 10px 30px rgba(0, 180, 216, 0.25);
    }

    /* আইকন ও টেক্সট স্টাইল */
    .icon-box {
      font-size: 45px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--text-light);
    }

    h1 span {
      color: var(--secondary);
    }

    p {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    /* সাধারণ বাটন */
    .btn {
      display: inline-block;
      background: var(--secondary);
      color: var(--dark-bg);
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #0096b4;
    }

    /* ৬. রেসপন্সিভনেস (মোবাইল লেআউট) */
    @media (max-width: 768px) {
      .coming-soon-card {
        padding: 30px 20px;
      }
      h1 {
        font-size: 24px;
      }
      p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- গ্লোবাল হেডার কঙ্কাল (গাইডলাইন অনুযায়ী) -->
  <ros-header></ros-header> 

  <!-- মূল কন্টেন্ট এরিয়া -->
  <main>
    <div class="coming-soon-card">
      <div class="icon-box">
        <i class="fa-solid fa-users-gear"></i>
      </div>
      <h1>কার্যনির্বাহী কমিটি <span>শীঘ্রই প্রকাশ করা হবে</span></h1>
      <p>
        রাজশাহী অলিম্পিয়াড সোসাইটির নতুন কার্যনির্বাহী কমিটি গঠনের কাজ চলছে। খুব শীঘ্রই অফিশিয়াল মেম্বারদের তালিকা এখানে প্রকাশ করা হবে। আমাদের সাথেই থাকুন।
      </p>
      <a href="/" class="btn">প্রধান পাতায় যান</a>
    </div>
  </main>

  <!-- গ্লোবাল ফুটার কঙ্কাল (গাইডলাইন অনুযায়ী) -->
  <ros-footer></ros-footer> 

  <!-- গ্লোবাল নেভিগেশন স্ক্রিপ্ট (গাইডলাইন অনুযায়ী) -->
  <script src="../../navigation.js"></script> 
</body>
</html>
