<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আমাদের কার্যক্রম - রাজশাহী অলিম্পিয়াড সোসাইটি</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* --- গ্লোবাল ভেরিয়েবল ও রুট স্টাইল --- */
    :root {
      --primary: #0a1128;
      --secondary: #00b4d8; 
      --accent: #ffd700;    
      --dark-bg: #020c1b;
      --card-bg: rgba(10, 25, 47, 0.65);
      --text-light: #f1f5f9;
      --text-muted: #94a3b8;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Hind Siliguri', sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-light);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 70vh;
    }

    /* --- পেজ হেডার এবং ফিল্টার এরিয়া --- */
    .page-header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 20px;
    }

    .page-title {
      font-size: 2.2rem;
      margin: 0;
      color: #fff;
      position: relative;
    }

    .page-title::after {
      content: '';
      position: absolute;
      bottom: -21px;
      left: 0;
      width: 60px;
      height: 3px;
      background-color: var(--secondary);
    }

    /* মূল ফিল্টার কন্টেইনার */
    .filter-section-wrapper {
      display: flex;
      align-items: center;
      gap: 12px; /* লেখা এবং বক্সের মধ্যকার দূরত্ব */
    }

    /* বক্সের বাইরের আইকন ও টেক্সট স্টাইল */
    .filter-outside-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .filter-outside-label i {
      color: var(--secondary);
      font-size: 0.95rem;
    }

    /* ছোট ও সুন্দর ফিল্টার সিলেক্ট বক্স */
    .filter-select-box {
      background-color: rgba(10, 25, 47, 0.8);
      color: var(--text-light);
      border: 1px solid rgba(0, 180, 216, 0.3);
      padding: 8px 16px;
      border-radius: 20px; /* রাউন্ডেড প্রিমিয়াম লুক */
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      min-width: 140px; /* অতিরিক্ত বড় হবে না, নির্দিষ্ট মাপে থাকবে */
      transition: all 0.3s ease;
    }

    .filter-select-box:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 10px rgba(0, 180, 216, 0.2);
    }

    .filter-select-box option {
      background-color: var(--primary);
      color: var(--text-light);
    }

    /* --- কার্যকলাপে গ্রিড লেআউট --- */
    .activities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    /* --- নিউজカード ডিজাইন --- */
    .activity-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 180, 216, 0.15);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      box-shadow: 0 10px 30px rgba(2, 12, 27, 0.7);
    }

    .activity-card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .activity-card:hover {
      transform: translateY(-8px);
      border-color: rgba(0, 180, 216, 0.4);
      box-shadow: 0 20px 40px rgba(0, 180, 216, 0.15);
    }

    .card-banner-wrapper {
      width: 100%;
      height: 200px;
      overflow: hidden;
      background-color: rgba(0, 0, 0, 0.2);
    }

    .card-banner {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .activity-card:hover .card-banner {
      transform: scale(1.05);
    }

    .card-body {
      padding: 25px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card-heading {
      font-size: 1.3rem;
      margin: 0 0 12px 0;
      line-height: 1.5;
      font-weight: 600;
    }

    .card-heading a {
      text-decoration: none;
      color: #e2e8f0;
      transition: color 0.2s;
    }

    .card-heading a:hover {
      color: var(--secondary);
    }

    .card-date {
      font-size: 0.9rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .card-date i {
      color: var(--secondary);
    }

    .card-categories {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cat-badge {
      background: rgba(0, 180, 216, 0.1);
      color: var(--secondary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid rgba(0, 180, 216, 0.15);
    }

    /* --- মোবাইল রেসপন্সিভ সিএসএস --- */
    @media (max-width: 600px) {
      .page-header-container {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      .filter-section-wrapper {
        width: 100%;
        justify-content: space-between; /* মোবাইলে লেখা বামে আর বক্স একদম ডানে সুন্দরভাবে এলাইন হবে */
      }
      .filter-select-box {
        min-width: 130px;
      }
      .page-title {
        font-size: 1.8rem;
      }
      .page-title::after {
        bottom: -16px;
      }
    }
  </style>
</head>
<body>

  <ros-header></ros-header>

  <main>
    <div class="page-header-container">
      <h1 class="page-title">আমাদের কার্যক্রম</h1>
      
      <div class="filter-section-wrapper">
        <div class="filter-outside-label">
          <i class="fa-solid fa-sliders"></i> ফিল্টার
        </div>
        <select class="filter-select-box" id="categoryFilter">
          <option value="all">সব কার্যক্রম</option>
        </select>
      </div>
    </div>

    <div class="activities-grid" id="mainActivitiesGrid">
       <p style="text-align:center; grid-column: 1/-1; padding:50px; color:#64748b;">কার্যক্রম স্ক্যান করা হচ্ছে...</p>
    </div>
  </main>

  <ros-footer></ros-footer>

  <script>
    let allNewsData = [];

    async function compileAndRenderActivities() {
      try {
        const listResponse = await fetch('News/list.json');
        if (!listResponse.ok) throw new Error('list.json ফাইলটি পাওয়া যায়নি');
        
        const newsFolders = await listResponse.json(); 

        const fetchPromises = newsFolders.map(folder => 
          fetch(`News/${folder}/data.json`).then(res => {
            if (!res.ok) throw new Error(`News/${folder}/data.json লোড করা যায়নি`);
            return res.json();
          })
        );
        
        allNewsData = await Promise.all(fetchPromises);
        
        allNewsData.sort((a, b) => {
          const dateTimeA = new Date(`${a.date} ${a.time || '00:00 AM'}`);
          const dateTimeB = new Date(`${b.date} ${b.time || '00:00 AM'}`);
          return dateTimeB - dateTimeA;
        });

        localStorage.setItem('allNewsData', JSON.stringify(allNewsData));

        buildFilterOptions(allNewsData);
        
        const urlParams = new URLSearchParams(window.location.search);
        const filterParam = urlParams.get('filter');
        
        if (filterParam) {
          document.getElementById('categoryFilter').value = filterParam;
          displayCards(allNewsData.filter(item => item.category && item.category.includes(filterParam)));
        } else {
          displayCards(allNewsData);
        }

      } catch (error) {
        console.error("অ্যাক্টিভিটি অটো-লোড ত্রুটি:", error);
        document.getElementById('mainActivitiesGrid').innerHTML = `
          <p style='grid-column: 1/-1; text-align:center; color:#ef4444; padding: 40px;'>
            <i class="fa-solid fa-circle-exclamation" style="font-size: 2rem; margin-bottom: 10px;"></i><br>
            কার্যক্রম লোড করতে ব্যর্থ হয়েছে। <br>
            <span style="font-size:0.9rem; color:#64748b;">নিশ্চিত করুন News/list.json এবং প্রতিটি সংবাদের data.json ফাইল ঠিক আছে।</span>
          </p>`;
      }
    }

    function buildFilterOptions(newsArray) {
      const select = document.getElementById('categoryFilter');
      const cats = new Set();
      
      newsArray.forEach(item => { 
        if(item.category) item.category.forEach(c => cats.add(c.trim())); 
      });
      
      cats.forEach(c => {
        const opt = document.createElement('option'); 
        opt.value = c; 
        opt.innerText = c; 
        select.appendChild(opt);
      });
      
      select.addEventListener('change', (e) => {
        displayCards(e.target.value === 'all' ? allNewsData : allNewsData.filter(item => item.category && item.category.includes(e.target.value)));
      });
    }

    function displayCards(newsArray) {
      const grid = document.getElementById('mainActivitiesGrid');
      grid.innerHTML = '';
      
      if(newsArray.length === 0) {
        grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:#64748b; padding:40px;'>এই ক্যাটাগরিতে কোনো কার্যক্রম পাওয়া যায়নি।</p>";
        return;
      }

      newsArray.forEach((news, index) => {
        const card = document.createElement('div');
        card.className = 'activity-card';
        
        let badges = '';
        if(news.category) {
          news.category.forEach(c => { 
            badges += `<span class="cat-badge">${c}</span>`; 
          });
        }

        card.innerHTML = `
          <div class="card-banner-wrapper">
            <img src="${news.image || 'default-banner.jpg'}" class="card-banner" alt="${news.title}">
          </div>
          <div class="card-body">
            <h2 class="card-heading">
               <a href="News/${news.link}/index.html">${news.title}</a>
            </h2>
            <div class="card-date"><i class="fa-solid fa-calendar-day"></i> ${news.date}</div>
            <div class="card-categories">${badges}</div>
          </div>
        `;
        
        grid.appendChild(card);
        
        setTimeout(() => { 
          card.classList.add('show'); 
        }, index * 80);
      });
    }

    window.onload = compileAndRenderActivities;
  </script>
  
  <script src="../navigation.js"></script>
</body>
</html>
