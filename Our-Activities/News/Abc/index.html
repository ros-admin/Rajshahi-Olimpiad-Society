<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>রাজশাহী অলিম্পিয়াড সোসাইটি কার্যনির্বাহী কমিটি গঠন ২০২৬</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* --- গ্লোবাল ভেরিয়েবল ও রুট স্টাইল --- */
    :root {
      --primary: #0a1128;
      --secondary: #00b4d8; 
      --accent: #ffd700;    
      --dark-bg: #020c1b;
      --text-light: #f1f5f9;
      --text-muted: #94a3b8;
      --card-bg: rgba(10, 25, 47, 0.65);
    }

    body {
      margin: 0; 
      padding: 0;
      font-family: 'Hind Siliguri', sans-serif;
      background-color: var(--dark-bg); 
      color: var(--text-light);
    }

    .news-detail-container {
      max-width: 800px; 
      margin: 0 auto; 
      padding: 40px 20px;
      min-height: 70vh;
    }

    /* ফিরে যাওয়ার বাটন */
    .back-link-btn {
      display: inline-flex; 
      align-items: center; 
      gap: 8px;
      color: var(--secondary); 
      text-decoration: none; 
      font-weight: 600;
      margin-bottom: 30px; 
      transition: 0.2s;
    }
    
    .back-link-btn:hover { 
      color: var(--accent); 
      transform: translateX(-5px); 
    }

    /* নিউজ কন্টেন্ট স্টাইলিং */
    .popup-title { 
      font-size: 2.2rem; 
      line-height: 1.4; 
      color: #fff; 
      margin: 0 0 20px 0; 
    }
    
    .popup-meta { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      flex-wrap: wrap; 
      gap: 15px; 
      margin-bottom: 30px; 
      border-bottom: 1px solid rgba(255,255,255,0.08); 
      padding-bottom: 15px; 
      color: var(--text-muted); 
      font-size: 0.9rem; 
    }
    
    .popup-meta-left { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 20px; 
    }
    
    .popup-meta span i { 
      color: var(--secondary); 
      margin-right: 4px; 
    }

    .btn-share { 
      background: rgba(0, 180, 216, 0.1); 
      color: var(--secondary); 
      border: 1px solid rgba(0, 180, 216, 0.3); 
      padding: 6px 16px; 
      border-radius: 20px; 
      cursor: pointer; 
      font-weight: 600; 
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    
    .btn-share:hover { 
      background: var(--secondary); 
      color: #fff; 
    }

    .popup-body-flow p { 
      font-size: 1.15rem; 
      line-height: 1.8; 
      color: #cbd5e1; 
      margin-bottom: 25px; 
      text-align: justify; 
    }
    
    .popup-media-container { 
      margin: 35px 0; 
      border-radius: 14px; 
      overflow: hidden; 
      border: 1px solid rgba(255,255,255,0.05); 
    }
    
    .popup-dynamic-img { 
      width: 100%; 
      max-height: 480px; 
      object-fit: cover; 
      display: block; 
    }
    
    .popup-img-caption-bar { 
      padding: 14px 20px; 
      background: rgba(2, 12, 27, 0.8); 
      font-size: 0.95rem; 
      color: #cbd5e1; 
      display: flex;
      justify-content: space-between;
    }
    
    .credit-logo { 
      color: var(--secondary); 
      margin-left: 8px; 
      margin-right: 4px;
    }
    
    .credit-name { 
      color: var(--accent); 
    }

    .popup-quote-box { 
      background: rgba(0, 180, 216, 0.04); 
      border-left: 4px solid var(--secondary); 
      padding: 25px 30px; 
      border-radius: 0 16px 16px 0; 
      margin: 35px 0; 
    }
    
    .quote-text { 
      font-size: 1.25rem; 
      font-style: italic; 
      color: #e2e8f0; 
      margin: 0 0 10px 0; 
    }
    
    .quote-author { 
      display: block; 
      text-align: right; 
      color: var(--accent); 
      font-size: 0.95rem; 
    }

    .popup-footer-categories-container { 
      margin-top: 40px; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }
    
    .cat-badge-link { 
      background: rgba(0, 180, 216, 0.12); 
      color: var(--secondary); 
      padding: 5px 14px; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      text-decoration: none; 
      border: 1px solid rgba(0, 180, 216, 0.2); 
      transition: 0.2s; 
    }
    
    .cat-badge-link:hover { 
      background: var(--secondary); 
      color: #fff; 
    }

    /* মতামত সেকশন */
    .feedback-section { 
      text-align: center; 
      margin: 50px 0 30px; 
    }
    
    .btn-feedback { 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      background: linear-gradient(135deg, #0077b6, #00b4d8); 
      color: #fff; 
      padding: 14px 30px; 
      border-radius: 50px; 
      text-decoration: none; 
      font-weight: 600; 
      box-shadow: 0 5px 15px rgba(0, 180, 216, 0.3); 
      transition: 0.3s; 
    }
    
    .btn-feedback:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 8px 25px rgba(0, 180, 216, 0.5); 
    }

    .section-divider { 
      border: 0; 
      height: 1px; 
      background: rgba(255,255,255,0.08); 
      margin: 40px 0; 
    }
    
    .section-subtitle { 
      font-size: 1.4rem; 
      color: var(--accent); 
      margin-bottom: 25px; 
    }

    /* সর্বশেষ সংবাদ গ্রিড লেআউট */
    .activities-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
      gap: 24px; 
    }
    
    .activity-card { 
      background: var(--card-bg); 
      border: 1px solid rgba(0, 180, 216, 0.15); 
      border-radius: 12px; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      transition: 0.3s;
    }
    
    .activity-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 180, 216, 0.3);
    }
    
    .card-banner-wrapper { 
      width: 100%; 
      height: 140px; 
      overflow: hidden; 
    }
    
    .card-banner { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    
    .card-body { 
      padding: 15px; 
      flex-grow: 1; 
    }
    
    .card-heading { 
      font-size: 1.05rem; 
      margin: 0 0 8px 0; 
      line-height: 1.4; 
      font-weight: 600; 
    }
    
    .card-heading a { 
      text-decoration: none; 
      color: #e2e8f0; 
    }
    
    .card-heading a:hover { 
      color: var(--secondary); 
    }
    
    .card-date { 
      font-size: 0.8rem; 
      color: var(--text-muted); 
    }

    /* টোস্ট নোটিফিকেশন ডিজাইন */
    .toast-notification {
      position: fixed; 
      bottom: -100px; /* ডিফল্ট স্ক্রিনের বাইরে থাকবে */
      left: 50%; 
      transform: translateX(-50%);
      background: #0f172a; 
      border: 1px solid var(--secondary); 
      color: #fff;
      padding: 12px 24px; 
      border-radius: 30px; 
      display: flex; 
      align-items: center; 
      gap: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
      font-size: 0.95rem; 
      z-index: 9999;
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .toast-notification.show { 
      bottom: 30px; /* একটিভ হলে স্ক্রিনে পপআপ করবে */
    }
    
    .toast-icon { 
      color: #22c55e; 
      font-size: 1.1rem; 
    }

    @media (max-width: 600px) {
      .popup-title { font-size: 1.7rem; }
      .popup-meta { flex-direction: column; align-items: flex-start; gap: 10px; }
      .btn-share { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <ros-header></ros-header>

  <main class="news-detail-container">
    <a href="../../index.html" class="back-link-btn">
      <i class="fa-solid fa-arrow-left-long"></i> ফিরে যান
    </a>

    <div id="mainNewsContent">
      <p style="text-align:center; padding: 40px; color: #64748b;">কার্যক্রমের তথ্য স্ক্যান করা হচ্ছে...</p>
    </div>

    <div class="feedback-section">
      <a href="../../../contact.html" class="btn-feedback">
        <i class="fa-regular fa-comment-dots"></i> এই নিউজ এর বিষয়ে মতামত জানান
      </a>
    </div>

    <hr class="section-divider">

    <section class="latest-news-section">
      <h3 class="section-subtitle">সর্বশেষ সংবাদ:</h3>
      <div class="activities-grid" id="latestNewsGrid"></div>
    </section>
  </main>

  <div class="toast-notification" id="toast">
    <i class="fa-solid fa-circle-check toast-icon"></i>
    <span>সংবাদের লিংকটি সফলভাবে কপি করা হয়েছে!</span>
  </div>

  <ros-footer></ros-footer>

  <script>
    async function loadCurrentNews() {
      try {
        // গিটহাব এবং লোকাল হোস্টের পাথ ঝামেলা এড়াতে কারেন্ট ডিরেক্টরি উল্লেখ করা হলো
        const response = await fetch('./data.json');
        if (!response.ok) throw new Error('data.json ফাইলটি খুঁজে পাওয়া যায়নি');
        
        const news = await response.json();
        renderNewsDetail(news);
        
        // লোকাল স্টোরেজ থেকে ব্যাকগ্রাউন্ডের সব ডেটা রিড করা
        const savedData = localStorage.getItem('allNewsData');
        if (savedData) {
          renderLatestGrid(JSON.parse(savedData), news.link);
        }
      } catch (error) {
        console.error("সংবাদ ডেটা ফেচিং ত্রুটি:", error);
        document.getElementById('mainNewsContent').innerHTML = 
          `<p style='color:#ef4444; text-align:center; padding: 20px;'>
            <i class="fa-solid fa-triangle-exclamation"></i> তথ্য লোড করা সম্ভব হয়নি। <br>
            <span style="font-size:0.9rem; color:#64748b;">নিশ্চিত করুন এই ফোল্ডারে data.json ফাইলটি ঠিক আছে।</span>
          </p>`;
      }
    }

    function renderNewsDetail(news) {
      const container = document.getElementById('mainNewsContent');
      
      let html = `
        <h1 class="popup-title">${news.title}</h1>
        <div class="popup-meta">
          <div class="popup-meta-left">
            <span><i class="fa-solid fa-pen-nib"></i> লেখা: ${news.author || 'অজানা'}</span>
            <span><i class="fa-solid fa-clock"></i> আপলোড: ${news.date || ''} ${news.time || ''}</span>
          </div>
          <button class="btn-share" onclick="copyNewsLink()"><i class="fa-solid fa-share-nodes"></i> শেয়ার</button>
        </div>
        <div class="popup-body-flow">
      `;

      if (news.image) {
        html += `
          <div class="popup-media-container">
            <img src="${news.image}" class="popup-dynamic-img" alt="${news.title}">
            ${(news.image_description || news.image_credit) ? `
              <div class="popup-img-caption-bar">
                <span>${news.image_description || ''}</span>
                ${news.image_credit ? `<span><i class="fa-solid fa-camera credit-logo"></i><span class="credit-name">${news.image_credit}</span></span>` : ''}
              </div>` : ''}
          </div>
        `;
      }

      if (news.news_content) {
        news.news_content.forEach(element => {
          if (element.type === 'paragraph') {
            html += `<p>${element.text}</p>`;
          } else if (element.type === 'image') {
            html += `
              <div class="popup-media-container">
                <img src="${element.url}" class="popup-dynamic-img" alt="">
                ${(element.description || element.credit) ? `
                  <div class="popup-img-caption-bar">
                    <span>${element.description || ''}</span>
                    ${element.credit ? `<span><i class="fa-solid fa-camera credit-logo"></i><span class="credit-name">${element.credit}</span></span>` : ''}
                  </div>` : ''}
              </div>`;
          } else if (element.type === 'quote') {
            html += `<div class="popup-quote-box"><p class="quote-text">${element.text}</p>${element.writer ? `<span class="quote-author">— ${element.writer}</span>` : ''}</div>`;
          }
        });
      }

      html += `</div>`;

      if (news.category) {
        html += `<div class="popup-footer-categories-container"><span class="popup-category-label">ক্যাটাগরি:</span>`;
        news.category.forEach(cat => { 
          html += `<a href="../../index.html?filter=${encodeURIComponent(cat)}" class="cat-badge-link">${cat}</a>`; 
        });
        html += `</div>`;
      }

      container.innerHTML = html;
      document.title = news.title + " - রাজশাহী অলিম্পিয়াড সোসাইটি";
    }

    function copyNewsLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 2500);
      }).catch(err => {
        console.error('লিংক কপি করা যায়নি:', err);
      });
    }

    function renderLatestGrid(allNews, currentLink) {
      const grid = document.getElementById('latestNewsGrid');
      if (!grid) return;
      grid.innerHTML = '';
      
      // বর্তমানের ওপেন থাকা নিউজটি বাদ দিয়ে বাকি সব থেকে সর্বশেষ ৬টি আলাদা করা
      const filtered = allNews
        .filter(item => item.link !== currentLink)
        .slice(0, 6);

      if(filtered.length === 0) {
        const section = document.querySelector('.latest-news-section');
        if (section) section.style.display = 'none';
        return;
      }

      filtered.forEach(news => {
        const card = document.createElement('div');
        card.className = 'activity-card';
        
        // রিলেটিভ পাথ জেনারেট করা হচ্ছে যাতে গিটহাবেও ইমেজ বাস্ট না হয়
        let imgPath = news.image;
        if (news.image && !news.image.startsWith('http') && !news.image.startsWith('../')) {
          imgPath = `../${news.link}/${news.image}`;
        }

        card.innerHTML = `
          <div class="card-banner-wrapper">
            <img src="${imgPath || '../../default-banner.jpg'}" class="card-banner" onerror="this.src='../../default-banner.jpg'" alt="">
          </div>
          <div class="card-body">
            <h2 class="card-heading"><a href="../${news.link}/index.html">${news.title}</a></h2>
            <div class="card-date"><i class="fa-solid fa-calendar-day"></i> ${news.date}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    window.onload = loadCurrentNews;
  </script>
  
  <script src="../../../navigation.js"></script>
</body>
</html>
