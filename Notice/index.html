<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বিজ্ঞপ্তি - রাজশাহী অলিম্পিয়াড সোসাইটি</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  
  <style>
    :root {
      --primary-color: #0d1b2a;
      --secondary-color: #00b4d8;
      --accent-color: #ffd700;
      --bg-dark: #01060d;
    }
    
    body {
      background-color: var(--bg-dark);
      color: #ffffff;
      font-family: 'Hind Siliguri', sans-serif;
      overflow-x: hidden;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <ros-header></ros-header>

  <main class="flex-grow container mx-auto px-4 py-16 max-w-4xl flex flex-col justify-center">
    
    <div class="text-center mb-12" data-aos="fade-up">
      <h1 class="text-3xl md:text-4xl font-bold mb-4 text-[#00b4d8] relative inline-block pb-3">
        বিজ্ঞপ্তি
        <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-20 h-1 bg-[#ffd700] rounded"></span>
      </h1>
      <p class="text-gray-400 mt-2 text-sm md:text-base tracking-wide">সংগঠনের সকল অফিশিয়াল নোটিশ ও আপডেটসমূহ এখানে দেখতে পাবেন</p>
    </div>

    <div class="w-full" data-aos="fade-up" data-aos-duration="1000">
      <table class="w-full text-left border-collapse table-fixed">
        
        <thead>
          <tr class="border-b border-gray-800 text-sm md:text-base text-[#00b4d8] font-bold">
            <th class="pb-4 pt-2 pr-2 pl-1 w-[25%] md:w-[20%]"><i class="fa-regular fa-calendar-days mr-1.5"></i>তারিখ</th>
            <th class="pb-4 pt-2 px-2 w-[55%] md:w-[60%]"><i class="fa-regular fa-file-lines mr-1.5"></i>বিষয়</th>
            <th class="pb-4 pt-2 pl-2 pr-1 w-[20%] text-center"><i class="fa-solid fa-circle-info mr-1.5"></i>বিস্তারিত</th>
          </tr>
        </thead>
        
        <tbody id="noticeTableBody" class="text-gray-300 text-xs md:text-sm divide-y divide-gray-900/40">
          <tr>
            <td colspan="3" class="py-12 text-center text-gray-500 font-light">
              <i class="fa-solid fa-spinner animate-spin text-[#00b4d8] text-xl mb-2 block"></i>
              বিজ্ঞপ্তি তালিকা লোড হচ্ছে...
            </td>
          </tr>
        </tbody>

      </table>
    </div>

  </main>

  <ros-footer></ros-footer>

  <script src="../navigation.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ once: true });

    document.addEventListener("DOMContentLoaded", () => {
      const tableBody = document.getElementById("noticeTableBody");

      fetch("../Notice/notice.json")
        .then(response => {
          if (!response.ok) {
            throw new Error("নেটওয়ার্ক রেসপন্স সঠিক ছিল না");
          }
          return response.json();
        })
        .then(data => {
          if (data.length === 0) {
            tableBody.innerHTML = `
              <tr>
                <td colspan="3" class="py-12 text-center text-gray-500 font-light">
                  <i class="fa-regular fa-folder-open text-2xl mb-2 block"></i>
                  বর্তমানে কোনো বিজ্ঞপ্তি পাওয়া যায়নি।
                </td>
              </tr>`;
            return;
          }

          // টেবিল বডি ক্লিয়ার করা
          tableBody.innerHTML = "";
          
          data.forEach(notice => {
            const row = document.createElement("tr");
            row.className = "hover:bg-slate-900/20 transition-colors duration-200 group";
            
            row.innerHTML = `
              <td class="py-4 pr-2 pl-1 text-gray-400 group-hover:text-white transition-colors break-words font-medium">
                ${notice.date || 'N/A'}
              </td>
              <td class="py-4 px-2 font-normal text-gray-200 group-hover:text-[#00b4d8] transition-colors leading-relaxed break-words">
                ${notice.title || 'শিরোনামহীন বিজ্ঞপ্তি'}
              </td>
              <td class="py-4 pl-2 pr-1 text-center">
                <a href="${notice.pdf_url || '#'}" target="_blank" class="inline-flex items-center justify-center gap-1 bg-[#00b4d8]/10 hover:bg-[#00b4d8] text-[#00b4d8] hover:text-white text-[11px] md:text-xs font-semibold py-1.5 px-2.5 rounded border border-[#00b4d8]/20 hover:border-transparent transition-all duration-300 shadow-sm w-full md:w-auto">
                  দেখুন <i class="fa-solid fa-file-pdf text-[10px]"></i>
                </a>
              </td>
            `;
            tableBody.appendChild(row);
          });
        })
        .catch(error => {
          console.error("Error fetching notices:", error);
          tableBody.innerHTML = `
            <tr>
              <td colspan="3" class="py-12 text-center text-rose-500/80 font-light">
                <i class="fa-solid fa-triangle-exclamation text-xl mb-2 block"></i>
                বিজ্ঞপ্তি লোড করতে সমস্যা হয়েছে।
              </td>
            </tr>`;
        });
    });
  </script>
</body>
</html>
